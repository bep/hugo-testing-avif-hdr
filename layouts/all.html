{{ define "main" }}
{{ $p := "" }}
{{ if .IsHome }}
	{{ $p = index .Sections 0 }}
{{ else }}
	{{ $p = . }}
{{ end }}
{{ $images := $p.Resources.ByType "image" }}
<div class="gallery">
	{{ range $images }}
		{{ if reflect.IsImageResourceProcessable . }}
			{{ $thumb := .Fill "1200x800 Bottom" }}
			<a href="{{ .RelPermalink }}" target="_blank"><img src="{{ $thumb.RelPermalink }}" alt="" loading="lazy"></a>
		{{ end }}
	{{ end }}
</div>
{{ end }}
